<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskSync Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/components.css">
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #0f172a, #020617);
        font-family: 'Inter', sans-serif;
      }

      .auth-card {
        width: min(420px, calc(100vw - 32px));
        padding: 32px;
        border-radius: 18px;
        background: rgba(15, 23, 42, 0.88);
        border: 1px solid rgba(148, 163, 184, 0.18);
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
        color: white;
      }

      .auth-card h1 {
        margin: 0 0 8px;
      }

      .auth-card p {
        color: rgba(226, 232, 240, 0.8);
      }

      .auth-form {
        display: grid;
        gap: 14px;
        margin-top: 20px;
      }

      .auth-form input {
        width: 100%;
        box-sizing: border-box;
      }

      #login-feedback {
        min-height: 1.25rem;
        color: #fca5a5;
        margin-top: 12px;
      }

      .auth-hint {
        font-size: 0.92rem;
      }

      .tabs {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
      }
      .tab-btn {
        flex: 1;
        background: transparent;
        border: 1px solid rgba(255,255,255,0.2);
        color: white;
        padding: 8px;
        border-radius: 8px;
        cursor: pointer;
      }
      .tab-btn.active {
        background: rgba(255,255,255,0.1);
        border-color: rgba(255,255,255,0.4);
      }
    </style>
  </head>
  <body>
    <div class="auth-card">
      <p class="eyebrow">Welcome to</p>
      <h1>&#9889; TaskSync</h1>
      
      <div class="tabs">
        <button class="tab-btn active" id="tab-login">Login</button>
        <button class="tab-btn" id="tab-register">Register</button>
      </div>

      <form id="login-form" class="auth-form" novalidate>
        <label>
          <span>Username</span>
          <input type="text" name="username" placeholder="demo" autocomplete="username" required>
        </label>
        <label>
          <span>Password</span>
          <input type="password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
        </label>
        <button type="submit" class="primary-btn">Log In</button>
        <p class="auth-hint">Default accounts: <strong>demo / demo123</strong> and <strong>admin / admin123</strong></p>
      </form>

      <form id="register-form" class="auth-form" style="display: none;" novalidate>
        <label>
          <span>Username</span>
          <input type="text" name="username" placeholder="Choose a username" autocomplete="username" required>
        </label>
        <label>
          <span>Display Name</span>
          <input type="text" name="display_name" placeholder="How should we call you?">
        </label>
        <label>
          <span>Password</span>
          <input type="password" name="password" placeholder="Choose a password" autocomplete="new-password" required>
        </label>
        <button type="submit" class="primary-btn">Register</button>
      </form>

      <p id="login-feedback"></p>
    </div>

    <script type="module">
      import { api } from '/js/api.js';

      const loginForm = document.getElementById('login-form');
      const registerForm = document.getElementById('register-form');
      const feedback = document.getElementById('login-feedback');
      const tabLogin = document.getElementById('tab-login');
      const tabRegister = document.getElementById('tab-register');

      tabLogin.addEventListener('click', () => {
        tabLogin.classList.add('active');
        tabRegister.classList.remove('active');
        loginForm.style.display = 'grid';
        registerForm.style.display = 'none';
        feedback.textContent = '';
      });

      tabRegister.addEventListener('click', () => {
        tabRegister.classList.add('active');
        tabLogin.classList.remove('active');
        registerForm.style.display = 'grid';
        loginForm.style.display = 'none';
        feedback.textContent = '';
      });

      async function handleAuth(event, isLogin) {
        event.preventDefault();
        feedback.textContent = '';
        const form = event.target;
        const button = form.querySelector('button');
        button.disabled = true;
        button.textContent = isLogin ? 'Logging in...' : 'Registering...';

        try {
          const payload = Object.fromEntries(new FormData(form).entries());
          const result = isLogin ? await api.login(payload) : await api.register(payload);
          localStorage.setItem('tasksync-user', JSON.stringify(result.user));
          window.location.href = '/index.html';
        } catch (error) {
          feedback.textContent = error.message || (isLogin ? 'Login failed' : 'Registration failed');
        } finally {
          button.disabled = false;
          button.textContent = isLogin ? 'Log In' : 'Register';
        }
      }

      loginForm.addEventListener('submit', (e) => handleAuth(e, true));
      registerForm.addEventListener('submit', (e) => handleAuth(e, false));
    </script>
  </body>
</html>
