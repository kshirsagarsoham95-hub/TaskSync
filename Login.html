<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <title>TaskSync Login</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Your CSS -->
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/theme.css">
  <link rel="stylesheet" href="/css/components.css">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #0f172a, #020617);
      font-family: 'Inter', sans-serif;
    }

    .auth-card {
      width: 350px;
      padding: 30px;
      border-radius: 16px;
      background: rgba(30, 41, 59, 0.8);
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      color: white;
    }

    .auth-form input {
      width: 100%;
      margin: 10px 0;
      padding: 12px;
      border-radius: 8px;
      border: none;
    }

    .primary-btn {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: #38bdf8;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: black;
      font-weight: bold;
    }

    #login-feedback {
      color: red;
      margin-top: 10px;
    }
  </style>

</head>

<body>

<div class="auth-screen">
  <div class="card auth-card">
    <h1>⚡ TaskSync</h1>

    <form id="login-form" class="auth-form">
      <input type="text" name="username" placeholder="demo" required>
      <input type="password" name="password" placeholder="••••••" required>

      <!-- FIXED BUTTON -->
      <button type="submit" class="primary-btn">Log In</button>
    </form>

    <p id="login-feedback"></p>
  </div>
</div>

<script type="module">
import { api } from '/js/api.js';

const form = document.getElementById("login-form");
const feedback = document.getElementById("login-feedback");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  feedback.textContent = "";

  const btn = form.querySelector("button");
  btn.disabled = true;
  btn.textContent = "Logging in...";

  try {
    const data = new FormData(form);
    const res = await api.login(Object.fromEntries(data.entries()));

    // Save user
    localStorage.setItem("tasksync-user", JSON.stringify(res.user));

    // Redirect
    window.location.href = "/index.html";

  } catch (err) {
    feedback.textContent = err.message || "Login failed";
  } finally {
    btn.disabled = false;
    btn.textContent = "Log In";
  }
});
</script>

</body>
